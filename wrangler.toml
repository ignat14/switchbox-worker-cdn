name = "switchbox-worker-cdn"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Cutover: uncommenting this route moves cdn.switchbox.dev from the R2 custom
# domain to this Worker. Instant, and reversible by re-commenting + deploying.
# Test on the workers.dev URL first.
# routes = [
#   { pattern = "cdn.switchbox.dev/*", zone_name = "switchbox.dev" }
# ]

[vars]
POSTHOG_HOST = "https://eu.i.posthog.com"
# POSTHOG_API_KEY is set via `wrangler secret put POSTHOG_API_KEY`
# (same public project key as the frontend's VITE_POSTHOG_KEY)

[[r2_buckets]]
binding = "CONFIGS"
bucket_name = "switchbox-configs"

[[kv_namespaces]]
binding = "CONNECTIONS"
# Create with: npx wrangler kv namespace create CONNECTIONS
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[analytics_engine_datasets]]
binding = "SDK_ANALYTICS"
dataset = "switchbox_sdk_requests"
